
<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HCV Veiculos</title>

  <!-- Fontes -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins&family=Roboto&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Roboto', sans-serif;
      background: #f4f4f4;
    }
nav{
  background: #657895; /* mesma cor do header*/
  text-align: center;
  padding: 10px 0;
  font-family: 'poppins', sans-serif;
}
  nav a {
    color: white;/* letras brancas*/
    text-decoration: none;/* remove o sublinhado */
    margin: 0 15px;
    font-weigth:bold;
    text-transform: uppercase;
    font-size: 14px;
    transition: 0.3s;
  }

    nav a:hover {
      opacity: 0.7;
    }
    header {
      position: sticky;
      top: 0;
      background: #657895;
      color: white;
      padding: 15px;
      text-align: center;
      font-family: 'Poppins', sans-serif;
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }

    .container {
      display: grid;
      place-items: center;
      height: 90vh;
      padding: 20px;
    }

    .form-box {
      background: white;
      padding: 30px;
      border-radius: 10px;
      width: 100%;
      max-width: 400px;
      animation: aparecer 1s ease-in-out;
    }

    .form-box h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #657895;
      font-family: 'Poppins', sans-serif;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    input, textarea {
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 5px;
      transition: 0.3s;
    }

    input:focus, textarea:focus {
      border-color: #657895;
      transform: scale(1.02);
      outline: none;
    }
.checkbox-group{
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 15px 0;
  color: #657895;
  font-family: 'poppins',sans-serif;
  font-size: 14px;
}
    .checkbox-group input {
      width: 18px;
      height: 18px;
      cursor: pointer;
      accent-color: #657895;
    }
    
    button {
      padding: 12px;
      border: none;
      background: #657895;
      color: white;
      font-weight: bold;
      border-radius: 5px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #4e627c;
      transform: scale(1.05);
    }

    @keyframes aparecer {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 600px) {
      .form-box {
        padding: 20px;
      }
    }

  </style>
</head>
<body> 
  <nav>
<a href="index.html">INICIO</a>
    <a href="vendas.html">CARROS</a>
    <a href="formulario.html">CONTATO</a>
  </nav>
  
  <header>
    <h1>HCV VEICULOS</h1>
  </header>

  <div class="container">
    <div class="form-box">
      <h2>Fale Conosco</h2>

      <form>
        <input type="text" placeholder="Nome" required>
        <input type="tel" placeholder="Telefone" required>
        <input type="email" placeholder="Email" required>
        <textarea rows="4" placeholder="Digite sua mensagem..." required></textarea>
        <div class="checkbox-group ">
         <input type= "checkbox" id="updates" name"updates">
          <label for="updates">Desejo receber atualizações</label>
        </div>
        <button type="submit">Enviar</button>
      </form>

    </div>
  </div>

</body>
</html>
